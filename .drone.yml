---
kind: pipeline
name: default
platform:
  os: linux
  arch: amd64
steps:
- name: docker_openssl
  image: plugins/docker
  settings:
    registry: atdr-writer.meo.ws
    username:
      from_secret: atdr_user
    password:
      from_secret: atdr_pass
    repo: atdr-writer.meo.ws/archiveteam/grab-base
    dockerfile: Dockerfile
    purge: true
    auto_tag: false
    tags:
    - latest
    - openssl
    build_args:
    - TLSTYPE=openssl
    platforms:
    - linux/amd64
    - linux/arm64
- name: docker_gnutls
  image: plugins/docker
  settings:
    registry: atdr-writer.meo.ws
    username:
      from_secret: atdr_user
    password:
      from_secret: atdr_pass
    repo: atdr-writer.meo.ws/archiveteam/grab-base
    dockerfile: Dockerfile
    purge: true
    auto_tag: false
    tags:
    - gnutls
    build_args:
    - TLSTYPE=gnutls
    platforms:
    - linux/amd64
    - linux/arm64
- name: docker_nss
  image: plugins/docker
  settings:
    registry: atdr-writer.meo.ws
    username:
      from_secret: atdr_user
    password:
      from_secret: atdr_pass
    repo: atdr-writer.meo.ws/archiveteam/grab-base
    dockerfile: Dockerfile
    purge: true
    auto_tag: false
    tags:
    - nss
    build_args:
    - TLSTYPE=nss
    platforms:
    - linux/amd64
    - linux/arm64
